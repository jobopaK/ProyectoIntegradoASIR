apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: first-pool
  namespace: metallb-system
spec:
  addresses:
  - 192.168.1.200-192.168.1.250 # Tu rango reservado
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: homelab-ad
  namespace: metallb-system
spec:
  ipAddressPools:
  - first-pool
